<style>
.btn {
  position: relative;
  padding: 0.75em 2.5em;
  font-size: var(--fs-4);
  font-weight: 500;
  color: var(--text-primary);
  background: var(--surface-1);
  border: 2px solid var(--border-default);
  border-radius: 100vw;
  cursor: pointer;

  &[data-btn-type="whimsical"] {
    --main-color: hsl(260, 80%, 70%);
    --deco-size: 7px;
    --deco-timing: 1.5s;

    --deco-1-color: oklch(from var(--main-color) 80% c h);
    --deco-1-end-translate: 0 30px;
    --deco-1-end-offset: 80%;

    --deco-2-color: oklch(from var(--main-color) 80% c calc(h + 50));
    --deco-2-scale: 0.85;
    --deco-2-end-translate: 0 -30px;
    --deco-2-end-offset: 60%;

    --deco-3-color: oklch(from var(--main-color) 70% c calc(h + 20));
    --deco-3-speed-variation: 0.85;
    --deco-3-scale: 1.15;
    --deco-3-end-translate: 0 -10px;
    --deco-3-end-offset: 70%;

    --deco-4-color: oklch(from var(--main-color) 80% c calc(h - 20));
    --deco-4-speed-variation: 1.2;
    --deco-4-scale: 0.7;
    --deco-4-end-translate: -20px 50px;
    --deco-4-end-offset: 75%;

    --deco-5-color: oklch(from var(--main-color) 80% c calc(h - 200));

    transition: border-color 0.4s ease;

    &::after {
      content: "";
      position: absolute;
      inset: -2px;
      background-color: var(--main-color);
      border-radius: inherit;
      z-index: -1;
      filter: blur(12px);
      opacity: 0;
      transition: opacity 0.5s;
    }

    &:hover,
    &:focus-visible {
      outline: none;
      border-color: var(--main-color);

      &::after {
        opacity: 0.5;
      }
    }
  }
}

.btn[data-btn-type="whimsical"] .deco {
  position: absolute;
  offset-path: border-box;
  offset-rotate: 0deg;
  width: calc(var(--deco-size) * var(--deco-scale, 1));
  aspect-ratio: 1 / 3;
  /* scale: var(--deco-scale, 1);
  transform-origin: center; */
  border-radius: 50%;
  background: var(--deco-color, var(--main-color));
  filter: blur(3px);
  opacity: 0;

  &::before,
  &::after {
    content: "";
    position: absolute;
    width: inherit;
    border-radius: inherit;
    aspect-ratio: inherit;
    background-color: inherit;
    translate: -50%;
  }

  &::before {
    rotate: 55deg;
  }
  &::after {
    rotate: -55deg;
  }
}

.btn[data-btn-type="whimsical"]:is(:hover, :focus-visible) .deco {
  offset-distance: var(--deco-end-offset, 70%);
  translate: var(--deco-end-translate);

  transition:
    translate calc(var(--deco-timing) * var(--deco-speed-variation, 1)),
    offset-distance calc(var(--deco-timing) * var(--deco-speed-variation, 1));
  animation: --decoration-life
    calc(var(--deco-timing) * var(--deco-speed-variation, 1) * 0.85) both;

  &:nth-child(1) {
    --deco-color: var(--deco-1-color);
    --deco-scale: var(--deco-1-scale);
    --deco-start-offset: var(--deco-1-start-offset);
    --deco-end-offset: var(--deco-1-end-offset);
    --deco-end-translate: var(--deco-1-end-translate);
    --deco-speed-variation: var(--deco-1-speed-variation);
  }
  &:nth-child(2) {
    --deco-color: var(--deco-2-color);
    --deco-scale: var(--deco-2-scale);
    --deco-start-offset: var(--deco-2-start-offset);
    --deco-end-offset: var(--deco-2-end-offset);
    --deco-end-translate: var(--deco-2-end-translate);
    --deco-speed-variation: var(--deco-2-speed-variation);
  }
  &:nth-child(3) {
    --deco-color: var(--deco-3-color);
    --deco-scale: var(--deco-3-scale);
    --deco-start-offset: var(--deco-3-start-offset);
    --deco-end-offset: var(--deco-3-end-offset);
    --deco-end-translate: var(--deco-3-end-translate);
    --deco-speed-variation: var(--deco-3-speed-variation);
  }
  &:nth-child(4) {
    --deco-color: var(--deco-4-color);
    --deco-scale: var(--deco-4-scale);
    --deco-start-offset: var(--deco-4-start-offset);
    --deco-end-offset: var(--deco-4-end-offset);
    --deco-end-translate: var(--deco-4-end-translate);
    --deco-speed-variation: var(--deco-4-speed-variation);
  }
  &:nth-child(5) {
    --deco-color: var(--deco-5-color);
    --deco-scale: var(--deco-5-scale);
    --deco-start-offset: var(--deco-5-start-offset);
    --deco-end-offset: var(--deco-5-end-offset);
    --deco-end-translate: var(--deco-5-end-translate);
    --deco-speed-variation: var(--deco-5-speed-variation);
  }
}

@keyframes --decoration-life {
  0% {
    opacity: 0;
  }
  20%,
  70% {
    opacity: 1;
  }
  100% {
    opacity: 0;
  }
}
</style>

@layer general-styling, visuals-for-demo;

@layer general-styling {
  :root {
    color-scheme: light dark;
    interpolate-size: allow-keywords;

    --ff-base: "Satoshi", system-ui, sans-serif;

    --brand-blue: light-dark(hsl(220, 74%, 41%), hsl(220, 100%, 61%));

    --brand-gradient: linear-gradient(
      var(--gradient-deg),
      var(--brand-blue),
      var(--brand-red)
    );

    @supports (background: linear-gradient(in oklch, red, blue)) {
      --brand-gradient: linear-gradient(
        var(--gradient-deg) in oklch,
        var(--brand-blue),
        var(--brand-red)
      );
    }

    --neutral-50: light-dark(hsl(30, 15%, 92%), hsl(60, 5%, 13%));
    --neutral-100: light-dark(hsl(30, 12%, 89%), hsl(60, 4%, 16%));
    --neutral-200: light-dark(hsl(30, 10%, 86%), hsl(60, 3%, 19%));
    --neutral-300: light-dark(hsl(30, 8%, 83%), hsl(60, 2%, 22%));
    --neutral-400: light-dark(hsl(30, 10%, 80%), hsl(60, 3%, 24%));
    --neutral-500: light-dark(hsl(30, 10%, 74%), hsl(60, 4%, 28%));
    --neutral-600: light-dark(hsl(30, 8%, 64%), hsl(60, 5%, 35%));
    --neutral-700: light-dark(hsl(30, 6%, 52%), hsl(60, 2%, 50%));
    --neutral-800: light-dark(hsl(30, 8%, 38%), hsl(60, 3%, 70%));
    --neutral-900: light-dark(hsl(30, 12%, 12%), hsl(60, 4%, 85%));

    --surface-1: var(--neutral-50);
    --surface-2: var(--neutral-100);
    --surface-3: var(--neutral-200);
    --surface-4: var(--neutral-300);

    --border-subtle: var(--neutral-400);
    --border-default: var(--neutral-500);
    --border-strong: var(--neutral-600);

    --text-primary: var(--neutral-900);
    --text-secondary: var(--neutral-800);
    --text-muted: var(--neutral-700);
    --text-inverse: var(--neutral-50);

    --link: inherit;
    --link-hover: var(--brand-blue);
    --link-active: var(--brand-red);
    --accent: light-dark(hsl(357, 60%, 40%), hsl(357, 60%, 40%));
    --primary: var(--brand-blue);

    /* @link https://utopia.fyi/type/calculator?c=360,18,1.2,1240,21,1.333,5,2,&s=0.75|0.5|0.25,1.5|2|3|4|6,s-l&g=s,l,xl,12 */
    --fs--2: clamp(0.7387rem, 0.7987rem + -0.0775vw, 0.7813rem);
    --fs--1: clamp(0.9375rem, 0.9182rem + 0.0857vw, 0.9846rem);
    --fs-0: clamp(1.125rem, 1.0483rem + 0.3409vw, 1.3125rem);
    --fs-1: clamp(1.35rem, 1.1865rem + 0.7265vw, 1.7496rem);
    --fs-2: clamp(1.62rem, 1.3287rem + 1.2948vw, 2.3322rem);
    --fs-3: clamp(1.944rem, 1.4675rem + 2.1178vw, 3.1088rem);
    --fs-4: clamp(2.3328rem, 1.5919rem + 3.2931vw, 4.144rem);
    --fs-5: clamp(2.7994rem, 1.6848rem + 4.9538vw, 5.524rem);

    /* @link https://utopia.fyi/space/calculator?c=360,18,1.2,1240,21,1.333,5,2,&s=0.75|0.5|0.25,1.5|2|3|4|6,s-l&g=s,l,xl,12 */
    --space-3xs: clamp(0.3125rem, 0.3125rem + 0vw, 0.3125rem);
    --space-2xs: clamp(0.5625rem, 0.5114rem + 0.2273vw, 0.6875rem);
    --space-xs: clamp(0.875rem, 0.8239rem + 0.2273vw, 1rem);
    --space-s: clamp(1.125rem, 1.0483rem + 0.3409vw, 1.3125rem);
    --space-m: clamp(1.6875rem, 1.5597rem + 0.5682vw, 2rem);
    --space-l: clamp(2.25rem, 2.0966rem + 0.6818vw, 2.625rem);
    --space-xl: clamp(3.375rem, 3.1449rem + 1.0227vw, 3.9375rem);
    --space-2xl: clamp(4.5rem, 4.1932rem + 1.3636vw, 5.25rem);
    --space-3xl: clamp(6.75rem, 6.2898rem + 2.0455vw, 7.875rem);
    --space-4xl: clamp(9rem, 8.3864rem + 2.7273vw, 10.5rem);

    /* One-up pairs */
    --space-3xs-2xs: clamp(0.3125rem, 0.1591rem + 0.6818vw, 0.6875rem);
    --space-2xs-xs: clamp(0.5625rem, 0.3835rem + 0.7955vw, 1rem);
    --space-xs-s: clamp(0.875rem, 0.696rem + 0.7955vw, 1.3125rem);
    --space-s-m: clamp(1.125rem, 0.767rem + 1.5909vw, 2rem);
    --space-m-l: clamp(1.6875rem, 1.304rem + 1.7045vw, 2.625rem);
    --space-l-xl: clamp(2.25rem, 1.5597rem + 3.0682vw, 3.9375rem);
    --space-xl-2xl: clamp(3.375rem, 2.608rem + 3.4091vw, 5.25rem);
    --space-2xl-3xl: clamp(4.5rem, 3.1193rem + 6.1364vw, 7.875rem);
    --space-3xl-4xl: clamp(6.75rem, 5.2159rem + 6.8182vw, 10.5rem);

    /* Custom pairs */
    --space-s-l: clamp(1.125rem, 0.5114rem + 2.7273vw, 2.625rem);
    --space-2xl-4xl: clamp(4.5rem, 2.0455rem + 10.9091vw, 10.5rem);
  }

  [data-theme="light"] {
    color-scheme: light;
  }

  [data-theme="dark"] {
    color-scheme: dark;
  }

  html {
    font-family: var(--ff-base, system-ui);
    line-height: 1.6;
    accent-color: var(--accent);

    -moz-text-size-adjust: none;
    -webkit-text-size-adjust: none;
    text-size-adjust: none;

    scroll-padding-block: 5lh;

    @media (prefers-reduced-motion: no-preference) {
      scroll-behavior: smooth;
    }
  }

  body {
    margin: 0;
    min-block-size: 70svb;
    background-color: var(--surface-1);
    color: var(--text-primary);
    font-size: var(--fs-1);

    display: grid;
    place-items: center;
  }

  h1,
  h2,
  h3,
  h4,
  p,
  figure,
  blockquote,
  dl,
  dd {
    margin-block: 0;
  }

  h1,
  h2,
  h3,
  h4 {
    color: var(--text-primary);
    text-wrap: balance;
  }

  h1,
  h2,
  h3,
  h4,
  button,
  input,
  label {
    line-height: 1.1;
  }

  h1 {
    font-size: var(--fs-4);
  }

  img,
  picture,
  iframe {
    display: block;
    block-size: auto;
    max-inline-size: 100%;
  }

  input,
  button,
  textarea,
  select {
    font-family: inherit;
    font-size: inherit;
  }

  textarea {
    min-block-size: 5lh;
  }

  a {
    color: var(--link);

    &:hover,
    &:focus-visible {
      color: var(--primary);
    }
  }

  .wrapper {
    inline-size: min(100% - 2rem, 960px);
    margin-inline: auto;
  }
}
</style>
